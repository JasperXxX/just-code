<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 580" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Claude Code loadout — visual stack overview">
  <defs>
    <style>
      .bg { fill: #0e0f12; }
      .tile { fill: #15171c; stroke: #2a2e38; stroke-width: 1.5; }
      .tile-core { fill: #15171c; stroke: #d4a05a; stroke-width: 2; }
      .tile-input { fill: #15171c; stroke: #6ea8ff; stroke-width: 1.5; }
      .tile-output { fill: #15171c; stroke: #7bb978; stroke-width: 1.5; }
      .icon { font-family: ui-monospace, "SF Mono", monospace; font-size: 44px; fill: #d4a05a; text-anchor: middle; }
      .name { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 17px; font-weight: 600; fill: #e8eaed; text-anchor: middle; }
      .role { font-family: ui-monospace, "SF Mono", monospace; font-size: 11px; fill: #6b7280; letter-spacing: 0.12em; text-transform: uppercase; text-anchor: middle; }
      .title { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 38px; font-weight: 700; fill: #e8eaed; letter-spacing: -0.02em; }
      .eyebrow { font-family: ui-monospace, "SF Mono", monospace; font-size: 13px; fill: #d4a05a; letter-spacing: 0.18em; text-transform: uppercase; }
      .legend { font-family: ui-monospace, "SF Mono", monospace; font-size: 12px; fill: #6b7280; letter-spacing: 0.06em; }
      .arrow { stroke: #6b7280; stroke-width: 1.5; fill: none; stroke-dasharray: 3 4; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="580"/>

  <!-- Title -->
  <text class="eyebrow" x="60" y="58">Claude Code Loadout</text>
  <text class="title" x="60" y="100">Stack at a glance</text>

  <!-- Row 1: Inputs -->
  <text class="legend" x="60" y="170">INPUTS</text>
  <line x1="155" y1="166" x2="660" y2="166" stroke="#2a2e38" stroke-width="1"/>

  <!-- Spokenly -->
  <g transform="translate(60, 190)">
    <rect class="tile-input" width="180" height="120" rx="10"/>
    <text class="icon" x="90" y="62">◉</text>
    <text class="name" x="90" y="90">Spokenly</text>
    <text class="role" x="90" y="108">voice input</text>
  </g>

  <!-- Ghostty -->
  <g transform="translate(260, 190)">
    <rect class="tile" width="180" height="120" rx="10"/>
    <text class="icon" x="90" y="62">⚡</text>
    <text class="name" x="90" y="90">Ghostty</text>
    <text class="role" x="90" y="108">terminal</text>
  </g>

  <!-- Claude Code (core, larger) -->
  <g transform="translate(460, 175)">
    <rect class="tile-core" width="200" height="150" rx="12"/>
    <text class="icon" x="100" y="74" style="fill: #d4a05a; font-size: 52px;">◆</text>
    <text class="name" x="100" y="108" style="font-size: 18px;">Claude Code</text>
    <text class="role" x="100" y="128">cli agent · core</text>
  </g>

  <!-- Row 1: Outputs -->
  <text class="legend" x="780" y="170">OUTPUTS</text>
  <line x1="880" y1="166" x2="1340" y2="166" stroke="#2a2e38" stroke-width="1"/>

  <!-- Zed -->
  <g transform="translate(780, 190)">
    <rect class="tile-output" width="180" height="120" rx="10"/>
    <text class="icon" x="90" y="62">▣</text>
    <text class="name" x="90" y="90">Zed</text>
    <text class="role" x="90" y="108">editor</text>
  </g>

  <!-- Sound + Caffeinate (hooks) -->
  <g transform="translate(980, 190)">
    <rect class="tile-output" width="180" height="120" rx="10"/>
    <text class="icon" x="90" y="62">♪</text>
    <text class="name" x="90" y="90">Hooks</text>
    <text class="role" x="90" y="108">sound · status</text>
  </g>

  <!-- Memory -->
  <g transform="translate(1180, 190)">
    <rect class="tile-output" width="160" height="120" rx="10"/>
    <text class="icon" x="80" y="62">⊟</text>
    <text class="name" x="80" y="90">Memory</text>
    <text class="role" x="80" y="108">cross-session</text>
  </g>

  <!-- Connecting arrows: Spokenly → Ghostty → Claude → Zed -->
  <path class="arrow" d="M 240 250 L 260 250"/>
  <path class="arrow" d="M 440 250 L 460 250"/>
  <path class="arrow" d="M 660 250 L 780 250"/>
  <path class="arrow" d="M 660 250 L 980 250"/>
  <path class="arrow" d="M 660 250 L 1180 250"/>

  <!-- Row 2: Side stack -->
  <text class="legend" x="60" y="370">DAILY DRIVERS · MACOS</text>
  <line x1="280" y1="366" x2="1340" y2="366" stroke="#2a2e38" stroke-width="1"/>

  <!-- Raycast -->
  <g transform="translate(60, 390)">
    <rect class="tile" width="200" height="120" rx="10"/>
    <text class="icon" x="100" y="62">▶</text>
    <text class="name" x="100" y="90">Raycast</text>
    <text class="role" x="100" y="108">launcher</text>
  </g>

  <!-- Rectangle -->
  <g transform="translate(280, 390)">
    <rect class="tile" width="200" height="120" rx="10"/>
    <text class="icon" x="100" y="62">▭</text>
    <text class="name" x="100" y="90">Rectangle</text>
    <text class="role" x="100" y="108">window mgmt</text>
  </g>

  <!-- Claude Desktop -->
  <g transform="translate(500, 390)">
    <rect class="tile" width="200" height="120" rx="10"/>
    <text class="icon" x="100" y="62">◐</text>
    <text class="name" x="100" y="90">Claude Desktop</text>
    <text class="role" x="100" y="108">gui client</text>
  </g>

  <!-- LaunchAgents -->
  <g transform="translate(720, 390)">
    <rect class="tile" width="200" height="120" rx="10"/>
    <text class="icon" x="100" y="62">⚙</text>
    <text class="name" x="100" y="90">LaunchAgents</text>
    <text class="role" x="100" y="108">background</text>
  </g>

  <!-- MCP -->
  <g transform="translate(940, 390)">
    <rect class="tile" width="200" height="120" rx="10"/>
    <text class="icon" x="100" y="62">⊕</text>
    <text class="name" x="100" y="90">MCP servers</text>
    <text class="role" x="100" y="108">safari · hf · context7</text>
  </g>

  <!-- Skills -->
  <g transform="translate(1160, 390)">
    <rect class="tile" width="180" height="120" rx="10"/>
    <text class="icon" x="90" y="62">∾</text>
    <text class="name" x="90" y="90">~190 Skills</text>
    <text class="role" x="90" y="108">22 plugins</text>
  </g>

  <!-- Footer caption -->
  <text class="legend" x="60" y="558">SETUP.HTML for the install guide  ·  INDEX.HTML for the full overview</text>
</svg>
